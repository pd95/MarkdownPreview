            const checkImage = '\
<svg width="25px" height="25px" viewBox="0 0 25 25" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">\
<g transform="translate(0.1699, 0.9593)" fill="currentColor">\
<rect opacity="0" x="0" y="0" width="24" height="24"></rect>\
<path d="M20.8086,6.03809 L20.8086,17.97165 C20.8086,19.98345 19.793,20.98925 17.7422,20.98925 L5.89651,20.98925 C3.85549,20.98925 2.8301,19.98345 2.8301,17.97165 L2.8301,6.03809 C2.8301,4.02637 3.85549,3.01075 5.89651,3.01075 L17.7422,3.01075 C19.793,3.01075 20.8086,4.02637 20.8086,6.03809 Z M14.8613,8.11817 L10.69143,14.81735 L8.70901,12.2588 C8.46487,11.93653 8.25002,11.84864 7.97658,11.84864 C7.52737,11.84864 7.18557,12.20997 7.18557,12.64942 C7.18557,12.87403 7.27346,13.08885 7.41994,13.28415 L9.87112,16.29195 C10.12502,16.63375 10.39846,16.77055 10.73049,16.77055 C11.06252,16.77055 11.34572,16.61425 11.5508,16.29195 L16.1406,9.06544 C16.2676,8.86036 16.3848,8.63575 16.3848,8.42091 C16.3848,7.96192 15.9844,7.66895 15.5645,7.66895 C15.3008,7.66895 15.0469,7.8252 14.8613,8.11817 Z"></path>\

';
            const copyLabelHTML = '<span class="sr-only" aria-live="polite" aria-atomic="true">Copy code</span>';
            const copiedLabelHTML = '<span class="sr-only" aria-live="polite" aria-atomic="true">Copied</span>';

            const setButtonLabel = (button, isCopied) => {
                button.innerHTML = (isCopied ? checkImage : copyImage) + (isCopied ? copiedLabelHTML : copyLabelHTML);
            };

            document.addEventListener('DOMContentLoaded', () => {
                document.querySelectorAll('pre > code').forEach(code => {
                    const pre = code.parentElement;
                    const wrapper = document.createElement('div');
                    wrapper.className = 'code-block';

                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'copy-btn';
                    button.title = 'Copy code';
                    button.setAttribute('aria-label', 'Copy code');
                    setButtonLabel(button, false);

                    pre.parentNode.insertBefore(wrapper, pre);
                    wrapper.appendChild(button);
                    wrapper.appendChild(pre);
                });
            });

            document.addEventListener('click', e => {
                const button = e.target.closest('.copy-btn');
                if (!button) {
                    return;
                }
                const code = button.closest('.code-block').querySelector('code').innerText;
                navigator.clipboard.writeText(code).then(() => {
                    setButtonLabel(button, true);
                    setTimeout(() => { setButtonLabel(button, false); }, 3000);
                });
            });
        </script>
        <title>{{FILENAME}}</title>
    </head>
    <body>
      <div id="container">
      {{HTML}}
      </div>
    </body>
</html>
